<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NFT Card</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <div class="card">
      <img src="./nft.image.png" alt="NFT card" />
      <h1>Equilibrium #3429</h1>
      <p class="teext">Our Equilibrium collection promotes balance and calm</p>
      <div class="infoDiv">
        <div>
          <img class="icon1" src="./icon-ethereum.svg" />
          <span class="price">0.041 ETH</span>
        </div>

        <div>
          <img class="icon2" src="./icon-clock.svg" />
          <span class="time">3 days left</span>
        </div>
      </div>
    </div>
  </body>
</html>
